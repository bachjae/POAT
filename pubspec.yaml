name: rallycoach
description: "RallyCoach — a fully offline AI tennis coach. Pose-based live coaching with an on-device Gemma brain; nothing ever leaves the phone."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State / navigation
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0

  # Pose + camera pipeline
  camera: ^0.12.0+1
  tflite_flutter: ^0.12.1
  wakelock_plus: ^1.6.1
  thermal: ^1.2.2

  # Coach voice
  flutter_tts: ^4.2.5

  # Coach Brain (on-device Gemma via LiteRT-LM)
  flutter_gemma: ^0.16.5

  # Storage
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5
  crypto: ^3.0.7

  # Runtime permission requests (camera)
  permission_handler: ^11.4.0

  # Progress charts
  fl_chart: ^1.2.0

  # Pro model import + CSV export.
  # wakelock_plus 1.6.1 (kept at latest for the KGP migration) requires
  # win32 ^6; share_plus ≥13 and file_picker ≥12.0.0-beta.1 are the first
  # releases that moved to win32 6, so the previous ^10/^8 pins could no
  # longer resolve at all. Move file_picker to 12 stable when it lands.
  file_picker: 12.0.0-beta.5
  share_plus: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.0
  build_runner: ^2.7.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/reference/
    - assets/phrases/
    - assets/prompts/
    - assets/drills.json

  fonts:
    - family: Archivo Black
      fonts:
        - asset: assets/fonts/ArchivoBlack-Regular.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Variable.ttf
